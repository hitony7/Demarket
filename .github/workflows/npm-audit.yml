name: Scheduled npm Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '41 6 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  frontend-audit:
    name: Frontend Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/Demarket

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/Demarket/package-lock.json

      - name: Set up npm
        run: npm install -g npm@11.6.2

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

  backend-audit:
    name: Backend Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Set up npm
        run: npm install -g npm@11.6.2

      - name: Install backend dependencies
        run: npm ci

      - name: Audit backend dependencies
        run: npm audit --audit-level=moderate
