name: Build and Validate

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/Demarket

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/Demarket/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check frontend
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/Demarket/dist/

  backend:
    name: Backend Smoke Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Smoke check route imports
        env:
          PINATA_API_KEY: test
          PINATA_API_SECRET: test
        run: node -e "import('./src/routes/index.js').then(() => console.log('backend routes ok')).catch((error) => { console.error(error); process.exit(1); })"
